<!DOCTYPE html>
<html>
<head>
<title>RFID Scanner</title>
</head>

<body>

<h2>ESP32 RFID Scanner</h2>

<button onclick="startScan()">Scan RFID</button>

<h3 id="uid">UID: Waiting...</h3>

<script>

function startScan(){

fetch("/scan_request")

setInterval(checkUID,1000)

}

function checkUID(){

fetch("/get_uid")
.then(res=>res.json())
.then(data=>{
document.getElementById("uid").innerHTML="UID: "+data.uid
})

}

</script>

</body>
</html>
