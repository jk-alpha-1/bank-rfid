<!DOCTYPE html>
<html>

<head>
<title>Create Account</title>

<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#1e293b;
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  animation:fadeIn 1s ease;
}

h2{
  margin-bottom:25px;
}

.input-box{
  position:relative;
  margin:20px 0;
}

.input-box input{
  width:100%;
  padding:12px;
  border:none;
  outline:none;
  border-radius:8px;
  background:#0f172a;
  color:white;
  font-size:14px;
}

.input-box label{
  position:absolute;
  left:12px;
  top:12px;
  color:#94a3b8;
  font-size:14px;
  transition:0.3s;
  pointer-events:none;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown) + label{
  top:-8px;
  left:10px;
  font-size:11px;
  color:#38bdf8;
  background:#1e293b;
  padding:0 5px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#1d4ed8;
  transform:scale(1.03);
}

.extra{
  margin-top:15px;
  font-size:14px;
}

.extra a{
  color:#38bdf8;
  text-decoration:none;
}

.extra a:hover{
  text-decoration:underline;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form action="/register" method="post">

<div class="input-box">
<input name="username" required placeholder=" ">
<label>Username</label>
</div>

<div class="input-box">
<input type="password" name="password" required placeholder=" ">
<label>Password</label>
</div>

<div class="input-box">
<input name="rfid" required placeholder=" ">
<label>RFID UID</label>
</div>

<button>Create Account</button>

</form>

<div class="extra">
Already have account? <a href="/">Login</a>
</div>

</div>

</body>

</html>
