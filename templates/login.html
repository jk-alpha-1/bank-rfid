<!DOCTYPE html>
<html>
<head>
<title>Smart Bank Login</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#1e293b;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{
margin-bottom:20px;
}

.input-box{
position:relative;
margin:20px 0;
}

.input-box input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
outline:none;
}

.input-box label{
position:absolute;
left:12px;
top:12px;
color:#94a3b8;
transition:0.3s;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown) + label{
top:-8px;
font-size:12px;
color:#38bdf8;
background:#1e293b;
padding:0 5px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.03);
}

.extra{
margin-top:15px;
}

.extra a{
color:#38bdf8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Smart Bank</h2>

<form action="/login" method="post">

<div class="input-box">
<input name="username" required placeholder=" ">
<label>Username</label>
</div>

<div class="input-box">
<input type="password" name="password" required placeholder=" ">
<label>Password</label>
</div>

<button>Login</button>

</form>

<div class="extra">
New user? <a href="/signup">Create Account</a>
</div>

</div>

</body>
</html>
